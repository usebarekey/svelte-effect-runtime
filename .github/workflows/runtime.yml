name: runtime

on:
  push:
    branches:
      - master
    paths:
      - modules/svelte-effect-runtime/package.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_version_bump:
    runs-on: ubuntu-latest

    outputs:
      has_version_bump: ${{ steps.detect.outputs.has_version_bump }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect_version_bump
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_version_bump=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --unified=0 "${{ github.event.before }}" "${{ github.sha }}" -- modules/svelte-effect-runtime/package.json | grep -Eq '^[+-][[:space:]]*"version":[[:space:]]*"'; then
            echo "has_version_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_version_bump=false" >> "$GITHUB_OUTPUT"
          fi

  lint_and_test:
    needs: detect_version_bump
    if: needs.detect_version_bump.outputs.has_version_bump == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: lint
        run: deno task lint

      - name: test
        run: deno task test

  build_runtime:
    needs:
      - detect_version_bump
      - lint_and_test
    if: needs.detect_version_bump.outputs.has_version_bump == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: build_runtime
        working-directory: ${{ github.workspace }}/modules/svelte-effect-runtime
        run: deno task build

  publish_runtime:
    needs:
      - detect_version_bump
      - lint_and_test
      - build_runtime
    if: needs.detect_version_bump.outputs.has_version_bump == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: build_runtime
        working-directory: ${{ github.workspace }}/modules/svelte-effect-runtime
        run: deno task build

      - name: publish_runtime
        working-directory: ${{ github.workspace }}/modules/svelte-effect-runtime
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > "${HOME}/.npmrc"
          fi

          npx -y npm@11.5.1 --version
          npx -y npm@11.5.1 publish --access public --provenance
